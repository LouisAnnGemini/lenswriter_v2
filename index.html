<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LensWriter</title>
    <script>
      // Globally suppress cross-origin "Script error." (often from Monaco Web Workers)
      // Placed here to ensure it runs before Vite's error overlay listener.
      window.addEventListener('error', function(e) {
        if (e.message === 'Script error.') {
          e.preventDefault();
          e.stopImmediatePropagation();
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
